<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>RLS Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
        }

        .header {
            display: flex;
            justify-content: space-between;
            padding: 16px 24px;
            background: #1e293b;
        }

        .logout {
            background: #ef4444;
            border: none;
            padding: 8px 14px;
            border-radius: 6px;
            color: white;
            cursor: pointer;
        }

        .container {
            padding: 24px;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid #334155;
        }

        th {
            color: #94a3b8;
        }

        .badge {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            background: #2563eb;
        }
    </style>
</head>

<body>

<div class="header">
    <h2>RLS Demo Dashboard</h2>
    <button class="logout" onclick="logout()">Logout</button>
</div>

<div class="container">

    <div class="card">
        <h3>Current User</h3>
        <p><strong>Token:</strong> <span id="user-id"></span></p>
        <p><strong>Department:</strong> <span id="user-dept"></span></p>
    </div>

    <div class="card">
        <h3>Employee Data (Simulated RLS)</h3>

        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Department</th>
                </tr>
            </thead>

            <!-- 🔥 THIS IS WHAT YOU WERE MISSING -->
            <tbody id="employee-table"></tbody>
        </table>
    </div>

</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

    const token = localStorage.getItem("token");

    if (!token) {
        window.location.href = "/index";
        return;
    }

    document.getElementById("user-id").innerText = token;
    
    loadEmployees(token);
});

async function loadEmployees(token) {
    const res = await fetch("/api/employees", {
        headers: {
            Authorization: `Bearer ${token}`
        }
    });

    const data = await res.json();

    const table = document.getElementById("employee-table");

    if (!table) {
        console.error("employee-table not found!");
        return;
    }

    table.innerHTML = "";

    // 👇 SET CURRENT USER DEPARTMENT
    if (data.length > 0) {
        document.getElementById("user-dept").innerText = data[0].department;
    }

    data.forEach(emp => {
        table.innerHTML += `
            <tr>
                <td>${emp.name}</td>
                <td><span class="badge">${emp.department}</span></td>
            </tr>
        `;
    });
}

function logout() {
    localStorage.removeItem("token");
    window.location.href = "/index";
}
</script>

</body>
</html>
